# TEMPORARY: this version exports cabal.project.freeze as a downloadable artifact.
# Run it once, download the freeze file from the run's Artifacts, commit it,
# then replace this file with the final pinned ci.yml.
name: CI
on:
  push:
    branches:
      - develop
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        cabal: ["3.6.2.0"]
        ghc: ["8.10.7"]
    steps:
      - uses: actions/checkout@v6
      - name: Setup Haskell
        id: setup
        uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: ${{ matrix.cabal }}
      - name: Cabal Update and Freeze
        run: |
          cabal update
          cabal freeze
      - name: Upload freeze file
        uses: actions/upload-artifact@v4
        with:
          name: cabal-freeze
          path: cabal.project.freeze
      - uses: actions/cache@v5
        with:
          path: |
            ${{ steps.setup.outputs.cabal-store }}
            dist-newstyle
          key: ${{ runner.os }}-${{ matrix.ghc }}-${{ hashFiles('cabal.project.freeze') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.ghc }}-
      - name: Build Site
        run: |
          cabal build
          cabal exec myblog build
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v5
        if: github.ref == 'refs/heads/develop'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          folder: docs
          target-folder: docs
          clean: true